name: CI - Build and Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '!src/**/chart/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '!src/**/chart/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_REGION: ap-south-1

jobs:
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    outputs:
      cart: ${{ steps.detect.outputs.cart }}
      catalog: ${{ steps.detect.outputs.catalog }}
      checkout: ${{ steps.detect.outputs.checkout }}
      orders: ${{ steps.detect.outputs.orders }}
      ui: ${{ steps.detect.outputs.ui }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            DIFF_CMD="git diff --name-only origin/${BASE_REF}...HEAD"
          else
            DIFF_CMD="git diff --name-only ${{ github.event.before }} ${{ github.event.after }}"
          fi
          
          CHANGED_FILES=$($DIFF_CMD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          ANY_CHANGE=false
          
          if echo "$CHANGED_FILES" | grep -q "^src/cart/"; then
            echo "cart=true" >> $GITHUB_OUTPUT
            ANY_CHANGE=true
          else
            echo "cart=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^src/catalog/"; then
            echo "catalog=true" >> $GITHUB_OUTPUT
            ANY_CHANGE=true
          else
            echo "catalog=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^src/checkout/"; then
            echo "checkout=true" >> $GITHUB_OUTPUT
            ANY_CHANGE=true
          else
            echo "checkout=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^src/orders/"; then
            echo "orders=true" >> $GITHUB_OUTPUT
            ANY_CHANGE=true
          else
            echo "orders=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^src/ui/"; then
            echo "ui=true" >> $GITHUB_OUTPUT
            ANY_CHANGE=true
          else
            echo "ui=false" >> $GITHUB_OUTPUT
          fi
          
          echo "any=$ANY_CHANGE" >> $GITHUB_OUTPUT

  build-and-push-cart:
    name: Build & Push Cart Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.cart == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve private ECR registry URI
        id: resolve-registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ -z "$AWS_ACCOUNT_ID" ] || [ "$AWS_ACCOUNT_ID" = "None" ]; then
            echo "Unable to resolve the AWS account ID." >&2
            exit 1
          fi
          REGISTRY_URI="$AWS_ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "registry_uri=$REGISTRY_URI" >> $GITHUB_OUTPUT

      - name: Ensure ECR repository exists
        env:
          REPOSITORY: retail-store-cart
        run: |
          aws ecr describe-repositories \
            --region ${{ env.AWS_REGION }} \
            --repository-names "$REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --region ${{ env.AWS_REGION }} \
            --repository-name "$REPOSITORY"

      - name: Build and push Docker image
        id: docker-build
        env:
          REGISTRY_URI: ${{ steps.resolve-registry.outputs.registry_uri }}
          REPOSITORY: retail-store-cart
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd src/cart
          docker build -t $REGISTRY_URI/$REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY_URI/$REPOSITORY:$IMAGE_TAG $REGISTRY_URI/$REPOSITORY:latest
          docker push $REGISTRY_URI/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY_URI/$REPOSITORY:latest
          echo "image_uri=$REGISTRY_URI/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update chart image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|tag: \".*\"|tag: \"$IMAGE_TAG\"|g" src/cart/chart/values.yaml

      - name: Commit chart update
        run: |
          git config --local user.email "gitops@github.com"
          git config --local user.name "GitOps Bot"
          git add src/cart/chart/values.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update cart image tag to ${{ github.sha }}"
            git push origin HEAD:gitops
          fi

